<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Use Guest Mode to describe your symptoms, nutrition, sleep, and reports for a free basic health analysis.">
    <meta name="keywords" content="health assessment, guest mode, nutrition log, upload health reports, free basic analysis">
    <meta name="author" content="Health Management">

    <title>Health Assessment | Health Management</title>

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="assessment-page">

<main class="assessment-shell">
    <a href="index.html" class="assessment-back" aria-label="Go back to home">
        <span aria-hidden="true">←</span>
        Home
    </a>

    <section class="guest-assessment" aria-labelledby="assessment-title">
        <div class="assessment-intro">
            <h1 id="assessment-title">Health Assessment</h1>
            <p>You’re using Guest mode. Describe your symptoms and get an instant basic analysis — no sign-up required.</p>
        </div>

        <form class="guest-assessment-form" action="#" method="post">
            <article class="assessment-form-card">
                <div class="assessment-card-heading">
                    <h2>Detailed Analysis</h2>
                    <p>Enter your condition and upload supporting documents.</p>
                </div>

                <label class="sr-only" for="symptom-details">Detailed analysis</label>
                <textarea id="symptom-details" name="symptom_details" placeholder="Please describe in detail what you are feeling, when it started, and any specific concerns..."></textarea>
            </article>

            <article class="assessment-form-card nutrition-card">
                <div class="assessment-card-heading">
                    <h2>Daily Nutrition Log</h2>
                </div>

                <div class="assessment-field-group">
                    <label for="breakfast">Breakfast (Time/Food)</label>
                    <input id="breakfast" name="breakfast" type="text" placeholder="e.g. 8:00am — Oatmeal with berries">
                </div>

                <div class="assessment-field-group">
                    <label for="lunch">Lunch (Time/Food)</label>
                    <input id="lunch" name="lunch" type="text" placeholder="e.g. 12:30pm — Grilled chicken salad">
                </div>

                <div class="assessment-field-group">
                    <label for="dinner">Dinner (Time/Food)</label>
                    <input id="dinner" name="dinner" type="text" placeholder="e.g. 7:00pm — Salmon with vegetables">
                </div>

                <div class="assessment-field-group">
                    <label for="sleep">Sleep &amp; Wake Time</label>
                    <input id="sleep" name="sleep" type="text" placeholder="e.g. Sleep 11pm — Wake 7am">
                </div>
            </article>

            <article class="assessment-form-card">
                <div class="assessment-card-heading">
                    <h2>Upload Reports (Optional)</h2>
                </div>

                <label class="report-upload" for="health-reports">
                    <input id="health-reports" name="health_reports" type="file" accept=".pdf,.jpg,.jpeg,.png" multiple>
                    <span class="upload-icon" aria-hidden="true">⇧</span>
                    <span class="upload-title">Click or drag to upload reports</span>
                    <span class="upload-note">Supports PDF, JPG, PNG (Max 10MB)</span>
                </label>
            </article>

            <button class="analysis-submit" type="submit">
                <span aria-hidden="true">✦</span>
                Get Free Basic Analysis
            </button>
        </form>
    </section>
</main>

<script src="js/main.js"></script>

</body>
</html>
